services:
  searxng:
    image: searxng/searxng
    restart: always
    ports:
      - 8080:8080
    volumes:
      - ./docker/searxng/config:/etc/searxng
      - ./docker/searxng/data:/var/cache/searxng

  mcp-searxng:
    image: isokoliuk/mcp-searxng:latest
    restart: always
    stdin_open: true
    environment:
      SEARXNG_URL: http://searxng:8080
    depends_on:
      - searxng
